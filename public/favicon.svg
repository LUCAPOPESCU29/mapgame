<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crownGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- Compass rose lines -->
  <g stroke="#C9A84C" stroke-opacity="0.35" stroke-width="0.8">
    <line x1="32" y1="6" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="58" y2="32"/>
    <line x1="13" y1="13" x2="51" y2="51"/>
    <line x1="51" y1="13" x2="13" y2="51"/>
  </g>

  <!-- Outer circle ring -->
  <circle cx="32" cy="32" r="26" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="0.8" fill="none"/>

  <!-- Compass rose points -->
  <g fill="#C9A84C" fill-opacity="0.5" filter="url(#goldGlow)">
    <!-- North -->
    <polygon points="32,7 30,18 32,16 34,18"/>
    <!-- South -->
    <polygon points="32,57 30,46 32,48 34,46"/>
    <!-- East -->
    <polygon points="57,32 46,30 48,32 46,34"/>
    <!-- West -->
    <polygon points="7,32 18,30 16,32 18,34"/>
  </g>

  <!-- Inner compass circle -->
  <circle cx="32" cy="32" r="4.5" stroke="#C9A84C" stroke-opacity="0.5" stroke-width="0.8" fill="none"/>

  <!-- Crown body -->
  <g filter="url(#goldGlow)">
    <!-- Crown base band -->
    <rect x="16" y="38" width="32" height="5" rx="1.5" fill="url(#crownGrad)"/>

    <!-- Crown left wall -->
    <rect x="16" y="28" width="5" height="12" rx="1" fill="url(#crownGrad)"/>
    <!-- Crown right wall -->
    <rect x="43" y="28" width="5" height="12" rx="1" fill="url(#crownGrad)"/>
    <!-- Crown center wall -->
    <rect x="29.5" y="25" width="5" height="15" rx="1" fill="url(#crownGrad)"/>

    <!-- Crown left spike (smaller) -->
    <polygon points="18.5,28 16,20 21,20" fill="url(#crownGrad)"/>
    <!-- Crown right spike (smaller) -->
    <polygon points="45.5,28 43,20 48,20" fill="url(#crownGrad)"/>
    <!-- Crown center spike (taller) -->
    <polygon points="32,25 29.5,17 34.5,17" fill="url(#crownGrad)"/>

    <!-- Crown jewels -->
    <circle cx="18.5" cy="20" r="2" fill="#F0D060" stroke="#8B6914" stroke-width="0.5"/>
    <circle cx="32" cy="17" r="2.5" fill="#F0D060" stroke="#8B6914" stroke-width="0.5"/>
    <circle cx="45.5" cy="20" r="2" fill="#F0D060" stroke="#8B6914" stroke-width="0.5"/>

    <!-- Inner jewel accents -->
    <circle cx="18.5" cy="20" r="1" fill="#fff" fill-opacity="0.6"/>
    <circle cx="32" cy="17" r="1.2" fill="#fff" fill-opacity="0.6"/>
    <circle cx="45.5" cy="20" r="1" fill="#fff" fill-opacity="0.6"/>

    <!-- Base detail line -->
    <line x1="16" y1="40" x2="48" y2="40" stroke="#F0D060" stroke-opacity="0.4" stroke-width="0.5"/>
  </g>
</svg>
